<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAQ Questverse - QBTI V5</title>
    <!-- 引入雷达图的 Chart.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #05070a;
            --bg-gradient: radial-gradient(circle at 50% 0%, #111827 0%, #05070a 70%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.4);
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg-gradient); background-color: var(--bg-dark); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; line-height: 1.6;
            padding: 40px 0;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)), radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.1; z-index: -1; pointer-events: none;
        }

        .container { width: 90%; max-width: 680px; position: relative; z-index: 1; }

        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border); border-radius: 12px; padding: 45px; box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7);
        }

        h1 { font-size: 2.2rem; letter-spacing: 6px; margin-bottom: 15px; font-weight: 300; text-align: center; }
        .subtitle { text-align: center; font-size: 0.9rem; color: var(--accent); letter-spacing: 4px; margin-bottom: 45px; text-transform: uppercase; }
        
        .literary-text {
            text-align: center; color: var(--text-muted); margin-bottom: 50px; font-size: 1rem; line-height: 2.2; letter-spacing: 1px;
        }
        .literary-text strong { color: var(--text-main); font-weight: 500; }

        .btn {
            display: inline-block; background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 14px 40px; font-size: 0.95rem; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; 
            letter-spacing: 3px; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent); color: var(--bg-dark); box-shadow: 0 0 20px var(--accent-glow); }
        .btn-secondary { color: var(--text-muted); border-color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); color: #fff; box-shadow: none; }

        .section { display: none; animation: fadeUp 0.6s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 答题区 */
        .progress-container { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.05); margin-bottom: 40px; position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-glow); }
        
        .question-title { font-size: 1.3rem; margin-bottom: 40px; font-weight: 400; line-height: 1.7; letter-spacing: 1px; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); color: var(--text-main);
            padding: 22px 24px; border-radius: 8px; font-size: 1.05rem; cursor: pointer; text-align: left; transition: all 0.2s ease; line-height: 1.6;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(100, 255, 218, 0.5); padding-left: 30px; }

        .nav-buttons { display: flex; justify-content: flex-start; }

        /* 结果区 */
        .result-header { text-align: center; margin-bottom: 30px; }
        .result-profession { color: var(--accent); font-size: 0.9rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 12px; display: inline-block; border-bottom: 1px solid var(--accent-glow); padding-bottom: 6px; }
        .result-name { font-size: 3rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 12px; }
        .result-slogan { font-style: italic; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 35px; text-align: center; }
        .result-desc { font-size: 1.05rem; color: #d1d5db; margin-bottom: 35px; text-align: justify; line-height: 1.9; }
        
        .believe-card { background: rgba(100, 255, 218, 0.05); border-left: 2px solid var(--accent); padding: 25px; margin-bottom: 45px; }
        .believe-card span { display: block; font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; margin-bottom: 12px; text-transform: uppercase; }
        .believe-card strong { font-size: 1.15rem; font-weight: 400; line-height: 1.6; letter-spacing: 1px; }

        .chart-container { position: relative; height: 320px; width: 100%; margin-bottom: 45px; }
        
        .action-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        /* 图鉴区 */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-top: 35px; }
        .gallery-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); padding: 18px 10px; border-radius: 6px; text-align: center; transition: all 0.3s; }
        .gallery-item:hover { border-color: var(--accent); background: rgba(100,255,218,0.05); }
        .gallery-item h4 { font-size: 0.9rem; color: var(--text-main); margin-bottom: 6px; font-weight: 400; }
        .gallery-item p { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }

        .footer { text-align: center; margin-top: 50px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.15); letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="container" id="app">
        
        <!-- 1. 首屏 -->
        <div id="home-section" class="section active">
            <div class="glass-panel" style="text-align: center;">
                <h1>QAQ QUESTVERSE</h1>
                <div class="subtitle">Definitive Belief Test</div>
                
                <div class="literary-text">
                    这里的每一道题，都没有“双赢”的选项。<br>
                    你必须在 <strong>速度与完美</strong> 之间妥协，<br>
                    在 <strong>秩序与破坏</strong> 之间站队，<br>
                    在 <strong>冰冷的真相</strong> 与 <strong>温热的人心</strong> 之间做出抉择。<br>
                    <span style="display: block; margin-top: 20px; color: var(--accent);">直面你的底色，不要犹豫。</span>
                </div>

                <button class="btn" onclick="startQuiz()">开始剥离</button>
            </div>
            <div class="footer">WE DON'T GROW BY LEVELS. WE GROW BY BELIEFS.</div>
        </div>

        <!-- 2. 答题区 -->
        <div id="quiz-section" class="section glass-panel">
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
            <div class="question-title" id="question">加载中...</div>
            <div class="options-grid" id="options"></div>
            <div class="nav-buttons">
                <button id="back-btn" class="btn btn-secondary" style="display:none; padding: 10px 20px; font-size: 0.8rem; border: none;" onclick="goBack()">← 返回重选</button>
            </div>
        </div>

        <!-- 3. 结果页 -->
        <div id="result-section" class="section glass-panel">
            <div class="result-header">
                <div class="result-profession" id="res-profession">PROFESSION</div>
                <div class="result-name" id="res-name">Name</div>
                <div class="result-slogan" id="res-slogan">"Slogan"</div>
            </div>
            
            <div class="result-desc" id="res-desc"></div>
            
            <div class="believe-card">
                <span>Core Believe</span>
                <strong id="res-believe"></strong>
            </div>

            <!-- 雷达图容器 -->
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>

            <div class="action-buttons">
                <button class="btn" onclick="location.reload()">重新测试</button>
                <button class="btn btn-secondary" onclick="showGallery()">查看全图鉴</button>
            </div>
        </div>

        <!-- 4. 全图鉴页 -->
        <div id="gallery-section" class="section glass-panel">
            <h2 style="text-align: center; margin-bottom: 12px; font-weight: 300; letter-spacing: 4px;">QUESTVERSE 图鉴</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px;">12 种信念，12 种改变世界的方式。</p>
            
            <div class="gallery-grid" id="gallery-container"></div>
            
            <div style="text-align: center; margin-top: 45px;">
                <button class="btn btn-secondary" onclick="closeGallery()">← 返回</button>
            </div>
        </div>

    </div>

    <script>
        // --- 核心角色数据库 ---
        const questies = {
            "001": { name: "Sunlion 太阳狮", profession: "Builder", slogan: "Build Possibilities.", desc: "天生的破局者与造物主。你极其厌恶纸上谈兵，对你来说，与其争论对错，不如先造出一个原型。你强悍的资源整合能力，能让一切“不可能”落地。", believe: "Every possibility begins with someone willing to build it." },
            "002": { name: "Moonowl 月鸮", profession: "Researcher", slogan: "Go Deep. Find Truth.", desc: "极端理性的本质洞察者。你无法忍受表面的繁荣与逻辑的漏洞。在所有人盲目向前冲时，只有你会停下来，用手术刀般的锐利剥开事物最底层的真相。", believe: "Truth always lives one layer deeper." },
            "003": { name: "Everphant 永恒象", profession: "Backbone", slogan: "Root Deep. Lift Others.", desc: "系统最稳固的承重墙。你不追求片刻的爆发，只相信长期的复利。当团队陷入混乱与绝望时，你那极其强悍的兜底能力和秩序感，是所有人最后的安全感。", believe: "Great things grow from steady hearts." },
            "004": { name: "Bloom Otter 花漾水獭", profession: "Spark", slogan: "Smile First. Magic Follows.", desc: "不可或缺的情绪反应堆。你拥有极其罕见的能量场，能在最压抑的高压环境中撕开一道光。你深知，有时候解决问题的不是冷冰冰的逻辑，而是人心。", believe: "Small joys change everything." },
            "005": { name: "Nightlynx 夜猞猁", profession: "Guardian", slogan: "Stay Quiet. Stay Powerful.", desc: "最危险也最敏锐的哨兵。你习惯游离在中心之外，冷眼旁观全局。你极度厌恶风险失控，总能在危机爆发前，悄无声息地拔掉最致命的引信。", believe: "Still waters run the deepest." },
            "006": { name: "Starlight Deer 星辉灵鹿", profession: "Warden", slogan: "Stand Steady. So Others Can Shine.", desc: "极具牺牲精神的边界守望者。真正的强大往往伴随着克制。你用极其坚定的底线护住团队的软肋，宁愿自己扛下所有反噬，也要让前方的人毫无后顾之忧。", believe: "True Strength Protects." },
            "007": { name: "Wildcoon 野浣熊", profession: "Explorer", slogan: "Break Rules. Find New Ways.", desc: "极致的规则破坏者与拓荒人。你天生反骨，极其厌恶被既定的框架束缚。就算前面是万丈深渊，只要那是张未知的地图，你也会毫不犹豫地跳下去。", believe: "Every new path begins with one brave step off the map." },
            "008": { name: "Stormraven 风暴渡鸦", profession: "Challenger", slogan: "知命而不认命，顺势而不失己。", desc: "认知的颠覆者。你不敬畏权威，只敬畏真理。你最擅长的事，就是把那些被所有人奉为圭臬的“常识”撕碎，在废墟上建立起更高维的理解。", believe: "The future belongs to those who never stop questioning." },
            "009": { name: "Snowleap 雪跃豹", profession: "Connector", slogan: "世界没有标准答案，而我就是一种答案。", desc: "高维度的共情者与翻译官。你能够敏锐地穿透每个人外表的伪装，触及他们最真实的脆弱。你用无可挑剔的真诚，在孤岛之间拉起最坚韧的索桥。", believe: "Understanding is the beginning of every connection." },
            "010": { name: "Dawnmust 晨曦野马", profession: "Vanguard", slogan: "Small Steps. Big Impact.", desc: "绝对的行动派先锋。你信奉“先开火，后瞄准”。当别人还在因为恐惧未知而疯狂推演时，你已经率先杀入战阵，用极其粗暴但有效的第一步撕开裂口。", believe: "The fastest way forward is to start." },
            "011": { name: "Scarletfox 绯焰狐", profession: "Storyteller", slogan: "Strong Enough To Be Soft.", desc: "重塑现实的叙事者。你极其擅长捕捉那些极其微小、荒诞或痛苦的瞬间，并将其翻转为充满张力的意义。你能够用一段故事，重新定义整个战局的士气。", believe: "Every story begins with courage." },
            "012": { name: "Stonehorn 岩角羊", profession: "Pioneer", slogan: "Walk Soft. Climb High.", desc: "内核极其坚硬的攀登者。你外表温柔，但极具主体性。一旦你在内心锚定了那个顶点，哪怕一路上所有人都放弃了，你也会不动声色地、死死咬住目标向上爬。", believe: "Gentleness and courage can live together." }
        };

        // --- V5.0 极致锐利版 12 题库 (互斥设计，拒绝模棱两可) ---
        const questions = [
            {
                q: "项目到了交付的死线，但你发现底层逻辑有一个极其隐蔽、只有你能看出来的Bug，目前不影响演示。你会？",
                a: [
                    { text: "照常交付上线。先拿下结果和节点，哪怕日后自己疯狂加班打补丁弥补。", points: ["010", "001", "007"] }, // 速度与结果优先
                    { text: "立刻叫停交付。顶着所有人的骂名，即使项目延期，也绝对不能让带病的代码上线。", points: ["002", "008", "005"] }, // 本质与底线优先
                    { text: "准备极其详尽的备用回滚方案。照常演示，但一旦出事，能在1秒内切回安全状态。", points: ["003", "006", "012"] }, // 兜底与秩序优先
                    { text: "立刻拉通核心团队，用最高情商安抚各方情绪，共创一个能同时应付两头的说辞。", points: ["009", "011", "004"] }  // 关系与氛围优先
                ]
            },
            {
                q: "团队新加入了一个业绩能力极其恐怖的天才，但他极度傲慢，无视所有规则并经常刺伤队友。你会如何处理他？",
                a: [
                    { text: "放权并给他最高的自由度。只要能打下江山，我愿意承受他带来的破坏和混乱。", points: ["001", "007", "010"] }, 
                    { text: "榨取他的认知价值。不在乎他的态度，只要能把他的顶级逻辑和方法论提取出来就行。", points: ["002", "008"] }, 
                    { text: "坚决清理出局。任何人都不能凌驾于系统的秩序之上，哪怕他是神，也不能摧毁团队基石。", points: ["003", "006", "005"] }, 
                    { text: "主动去深度接触他，寻找他傲慢外表下的心理缺失，试图将这把野兽般的刀感化为己用。", points: ["009", "011", "004", "012"] } 
                ]
            },
            {
                q: "当你被扔进一个完全未知的领域（比如让你从零开始搭建一个你从未接触过的系统），你的第一反应是？",
                a: [
                    { text: "先让手脏起来。别管什么理论，直接去拼凑现有工具，跑通第一个极简模型（MVP）。", points: ["010", "001", "007"] }, 
                    { text: "闭关研究。查阅大量的底层资料和论文，直到我能在脑海里清晰地画出整个架构树。", points: ["002", "008", "005"] }, 
                    { text: "列出排期表。梳理可用的资源、预算和最坏的风险预案，确保每一步都在控制之中。", points: ["003", "006", "012"] }, 
                    { text: "到处找人聊。找那些做过类似事情的行业大佬喝咖啡，用连接力快速获取核心诀窍。", points: ["009", "011", "004"] } 
                ]
            },
            {
                q: "团队开会时，对于一个重大决议，所有人都在无休止地争论，且都非常有道理。你会如何终结这场会议？",
                a: [
                    { text: "“别吵了，就按A方案做，出了问题我负责。” —— 用强权和行动直接破局。", points: ["001", "010", "012"] }, 
                    { text: "“你们的逻辑都有致命伤，我们来看这两组核心数据。” —— 用最冷血的客观事实降维打击。", points: ["002", "008", "005"] }, 
                    { text: "“不管选哪个，底线是成本不能超。谁能保证不爆雷，就听谁的。” —— 强调系统的生死线。", points: ["003", "006"] }, 
                    { text: "“大家都累了，我们的初衷是为了赢，不是为了证明谁对。” —— 瓦解对立情绪，重新凝聚人心。", points: ["009", "004", "011"] } 
                ]
            },
            {
                q: "在评价一个人的“价值”时，你内心深处极其排他的最高标准是什么？",
                a: [
                    { text: "【创造力】：他能否无中生有，把一件事情从 0 变成 1。", points: ["001", "007", "010"] }, 
                    { text: "【洞察力】：他能否在极度复杂的迷雾中，一眼看透事物的本质。", points: ["002", "008", "005"] }, 
                    { text: "【确定性】：他是不是一个无论发生什么，永远都不会崩盘、绝对可控的人。", points: ["003", "006", "012"] }, 
                    { text: "【共情力】：他能否敏锐地察觉他人的痛苦，并给予真正有力量的托举。", points: ["009", "004", "011"] } 
                ]
            },
            {
                q: "当现有的所有规则和流程，都在严重拖累你完成一个本该能极高产出的目标时，你会？",
                a: [
                    { text: "彻底无视规则。事后可能会被处罚，但当我把巨大的战果摆在桌上，一切都会被原谅。", points: ["007", "010", "001"] }, 
                    { text: "精读规则条款。找到里面的法律/逻辑盲区，在不违反字面意思的情况下完美绕过它。", points: ["002", "008"] }, 
                    { text: "隐忍并蛰伏。规则就是规则，我会顺应它，直到我爬到能亲自重写规则的位置。", points: ["003", "006", "005", "012"] }, 
                    { text: "动用人脉杠杆。找到制定或管理规则的那个人，用情感和利益说服他为我开绿灯。", points: ["009", "011", "004"] } 
                ]
            },
            {
                q: "你倾注了半年心血的项目遭遇不可抗力，面临彻底的失败。在最崩溃的那个夜晚，你是如何自救的？",
                a: [
                    { text: "立刻注册一个新域名/拉一个新群。用启动一个新事物的快感，强行覆盖失败的痛苦。", points: ["007", "010", "001"] }, 
                    { text: "把自己关起来做一场极其残酷的尸检报告。不是谁的错，是哪一行公式写错了。", points: ["002", "008", "005"] }, 
                    { text: "清点剩余资产。盘点还剩多少钱、多少人，确保团队的元气没有被彻底打散，等待重建。", points: ["003", "006", "012"] }, 
                    { text: "接受自己的脆弱。找最懂我的人大哭一场，然后把这段经历写成故事，让痛苦升华。", points: ["009", "011", "004"] } 
                ]
            },
            {
                q: "一场极其艰难的战役终于打赢了，在庆功宴上，你最享受的瞬间是？",
                a: [
                    { text: "看着自己亲手打下的版图，脑海里已经开始规划下一个更疯狂的征服目标。", points: ["001", "010", "007"] }, 
                    { text: "那个纠缠了你几个月的复杂难题，在脑海中闭环、彻底解开的那种极致的智力愉悦。", points: ["002", "008", "005"] }, 
                    { text: "看着身边这群人。我们一起挺过来了，且系统运转得极其健康，没有一个人掉队。", points: ["003", "006", "012"] }, 
                    { text: "当大家举杯相拥，那种在场所有人情绪完全共振、彼此深深信任的极致连接感。", points: ["004", "009", "011"] } 
                ]
            },
            {
                q: "如果要你在自己的性格里植入一个绝对的“缺陷”，你宁愿选择哪个？",
                a: [
                    { text: "极度的急躁与不耐烦。忍受不了任何缓慢和迟疑，导致经常冲锋过头。", points: ["010", "001", "007"] }, 
                    { text: "极度的冷血与理智。为了追求真理，可以剥离掉所有感性，让人觉得不近人情。", points: ["002", "008", "005"] }, 
                    { text: "极度的固执与保守。为了守住底线，可以拒绝所有看似光鲜的诱惑和捷径。", points: ["003", "006", "012"] }, 
                    { text: "极度的心软与情绪化。容易被他人的痛苦牵扯，导致在杀伐决断时不够果决。", points: ["009", "004", "011"] } 
                ]
            },
            {
                q: "在一艘即将沉没、且只能带走一样东西的飞船上，代表你终极信念的是？",
                a: [
                    { text: "一把能建造一切的万能工具枪。", points: ["001", "010", "007"] }, 
                    { text: "一枚装载了宇宙所有客观定律和知识的芯片。", points: ["002", "008", "005"] }, 
                    { text: "一颗能让任何恶劣环境重新长出秩序与生命的种子。", points: ["003", "006", "012"] }, 
                    { text: "一本记录了人类所有荒诞、美丽、痛苦与爱的诗集。", points: ["011", "009", "004"] } 
                ]
            },
            {
                q: "有人用极其难听、但似乎又有几分道理的话当众攻击了你的工作，你的第一反应是？",
                a: [
                    { text: "直接怼回去，或者立刻用一个碾压级的战绩把他的脸打肿。", points: ["010", "001", "007"] }, 
                    { text: "屏蔽他的情绪词汇，在大脑里拆解他话里那“几分道理”到底在逻辑上成不成立。", points: ["002", "008", "005"] }, 
                    { text: "面无表情地看着他，不卑不亢。只要没有触犯我的核心底线，随便他怎么跳。", points: ["003", "006", "012"] }, 
                    { text: "用一种幽默或自黑的方式巧妙化解尴尬，既保全了自己的体面，也掌控了全场气氛。", points: ["004", "011", "009"] } 
                ]
            },
            {
                q: "这世界很大，但你内心真正渴望成为的是一种什么样的人？",
                a: [
                    { text: "一个无法被定义的风暴眼。我在哪里，哪里就有新的规则和生机被创造出来。", points: ["001", "007", "010"] }, 
                    { text: "一个清醒的旁观者。在这个疯狂的世界里，永远保持最高维的认知和最通透的目光。", points: ["002", "008", "005"] }, 
                    { text: "一座不可撼动的大山。任凭外界如何变幻，我始终坚定地托举着我所珍视的一切。", points: ["003", "006", "012"] }, 
                    { text: "一束温柔的火光。让每一个靠近我的人，都能在这个冷漠的世界里感到被理解、被照亮。", points: ["009", "004", "011"] } 
                ]
            }
        ];

        let currentQuestion = 0;
        let scores = {};
        let selectionHistory = []; 

        function initScores() { for (let key in questies) scores[key] = 0; }
        initScores();

        function startQuiz() {
            document.getElementById('home-section').classList.remove('active');
            document.getElementById('quiz-section').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const qData = questions[currentQuestion];
            document.getElementById('question').innerHTML = `<span style="color: var(--accent); font-size: 0.9rem; letter-spacing: 2px;">QUESTION ${currentQuestion + 1}/${questions.length}</span><br><br>${qData.q}`;
            
            setTimeout(() => { document.getElementById('progress').style.width = `${((currentQuestion) / questions.length) * 100}%`; }, 50);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 

            qData.a.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option.text;
                btn.onclick = () => selectOption(option.points);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('back-btn').style.display = currentQuestion > 0 ? 'inline-block' : 'none';
        }

        function selectOption(points) {
            selectionHistory.push(points); 
            points.forEach(p => scores[p] += 1);
            currentQuestion++;

            if (currentQuestion < questions.length) {
                const quizSec = document.getElementById('quiz-section');
                quizSec.style.opacity = '0';
                setTimeout(() => {
                    showQuestion();
                    quizSec.style.opacity = '1';
                }, 200);
            } else {
                document.getElementById('progress').style.width = `100%`;
                setTimeout(showResult, 400);
            }
        }

        function goBack() {
            if (currentQuestion > 0) {
                const lastPoints = selectionHistory.pop(); 
                lastPoints.forEach(p => scores[p] -= 1); 
                currentQuestion--;
                
                const quizSec = document.getElementById('quiz-section');
                quizSec.style.opacity = '0';
                setTimeout(() => {
                    showQuestion();
                    quizSec.style.opacity = '1';
                }, 200);
            }
        }

        function showResult() {
            document.getElementById('quiz-section').classList.remove('active');
            
            let maxScore = -1;
            let finalId = "001";
            for (let id in scores) { if (scores[id] > maxScore) { maxScore = scores[id]; finalId = id; } }

            const res = questies[finalId];
            document.getElementById('res-profession').innerText = res.profession;
            document.getElementById('res-name').innerText = res.name;
            document.getElementById('res-slogan').innerText = `"${res.slogan}"`;
            document.getElementById('res-desc').innerText = res.desc;
            document.getElementById('res-believe').innerHTML = res.believe;

            document.getElementById('result-section').classList.add('active');
            renderRadarChart();
            renderGallery();
        }

        let myChart = null;
        function renderRadarChart() {
            const dimensionScores = [
                scores["001"] + scores["007"], 
                scores["002"] + scores["008"], 
                scores["003"] + scores["006"] + scores["005"], 
                scores["009"] + scores["011"], 
                scores["010"] + scores["012"], 
                scores["004"] + scores["009"]  
            ];

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (myChart) myChart.destroy(); 

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['破局创造', '本质洞察', '秩序兜底', '共情连接', '野蛮行动', '情绪感染'],
                    datasets: [{
                        label: '能力象限',
                        data: dimensionScores,
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        borderColor: '#64ffda',
                        pointBackgroundColor: '#64ffda',
                        pointBorderColor: '#05070a',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#64ffda',
                        borderWidth: 1.5,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.05)' },
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            pointLabels: { color: '#9ca3af', font: { size: 12, family: '-apple-system', weight: '400' } },
                            ticks: { display: false, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';
            for (let id in questies) {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `<h4>${questies[id].name}</h4><p>${questies[id].profession}</p>`;
                container.appendChild(item);
            }
        }

        function showGallery() {
            document.getElementById('result-section').classList.remove('active');
            document.getElementById('gallery-section').classList.add('active');
            window.scrollTo(0, 0);
        }

        function closeGallery() {
            document.getElementById('gallery-section').classList.remove('active');
            document.getElementById('result-section').classList.add('active');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
