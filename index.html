<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAQ Questverse - QBTI</title>
    <!-- 引入雷达图的 Chart.js 库 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #07090f;
            --bg-gradient: radial-gradient(circle at 50% 0%, #1a2235 0%, #07090f 70%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, Arial, sans-serif; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg-gradient); background-color: var(--bg-dark); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; line-height: 1.6;
            padding: 40px 0;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #ffffff, rgba(0,0,0,0)), radial-gradient(2px 2px at 90px 40px, #ffffff, rgba(0,0,0,0));
            background-size: 200px 200px; opacity: 0.15; z-index: -1; pointer-events: none;
        }

        .container { width: 90%; max-width: 680px; position: relative; z-index: 1; }

        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border); border-radius: 16px; padding: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 12px; font-weight: 300; text-align: center; }
        .subtitle { text-align: center; font-size: 0.95rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 40px; text-transform: uppercase; }
        .desc-text { text-align: center; color: var(--text-muted); margin-bottom: 50px; font-size: 1.05rem; }

        .btn {
            display: inline-block; background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 12px 30px; font-size: 0.95rem; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px; text-transform: uppercase;
        }
        .btn:hover { background: var(--accent); color: var(--bg-dark); box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
        .btn-secondary { color: var(--text-muted); border-color: var(--text-muted); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; }

        .section { display: none; animation: fadeUp 0.6s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Progress & Questions */
        .progress-container { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.1); margin-bottom: 40px; border-radius: 2px; position: relative; }
        .progress-bar { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-glow); }
        
        .question-title { font-size: 1.3rem; margin-bottom: 30px; font-weight: 400; line-height: 1.6; }
        .options-grid { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main);
            padding: 18px 22px; border-radius: 12px; font-size: 1rem; cursor: pointer; text-align: left; transition: all 0.2s ease; line-height: 1.5;
        }
        .option-btn:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(100, 255, 218, 0.3); transform: translateX(5px); }

        .nav-buttons { display: flex; justify-content: flex-start; }

        /* Results & Chart */
        .result-header { text-align: center; margin-bottom: 30px; }
        .result-profession { color: var(--accent); font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; display: inline-block; border-bottom: 1px solid var(--accent-glow); padding-bottom: 4px; }
        .result-name { font-size: 2.5rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; }
        .result-slogan { font-style: italic; color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px; text-align: center; }
        .result-desc { font-size: 1rem; color: #d1d5db; margin-bottom: 30px; text-align: justify; }
        
        .believe-card { background: rgba(0, 0, 0, 0.2); border-left: 3px solid var(--accent); padding: 20px; border-radius: 0 8px 8px 0; margin-bottom: 40px; }
        .believe-card span { display: block; font-size: 0.75rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase; }
        .believe-card strong { font-size: 1.1rem; font-weight: 400; line-height: 1.5; }

        .chart-container { position: relative; height: 300px; width: 100%; margin-bottom: 40px; }
        
        .action-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 30px; }
        .gallery-item { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; text-align: center; transition: all 0.3s; }
        .gallery-item:hover { border-color: var(--accent); transform: translateY(-3px); }
        .gallery-item h4 { font-size: 0.9rem; color: var(--text-main); margin-bottom: 5px; }
        .gallery-item p { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="container" id="app">
        
        <!-- 1. 首屏 -->
        <div id="home-section" class="section active">
            <div class="glass-panel" style="text-align: center; padding: 60px 40px;">
                <h1>QAQ QUESTVERSE</h1>
                <div class="subtitle">Discover Your Believe Badge</div>
                <p class="desc-text">这里没有等级，没有对错。<br>只有关于内心深处最纯粹的信念选择。<br>准备好遇见你心中的 Questy 了吗？</p>
                <button class="btn" onclick="startQuiz()">开启探索</button>
            </div>
        </div>

        <!-- 2. 答题区 -->
        <div id="quiz-section" class="section glass-panel">
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
            <div class="question-title" id="question">加载中...</div>
            <div class="options-grid" id="options"></div>
            <div class="nav-buttons">
                <button id="back-btn" class="btn btn-secondary" style="display:none;" onclick="goBack()">← 返回上一题</button>
            </div>
        </div>

        <!-- 3. 结果页 -->
        <div id="result-section" class="section glass-panel">
            <div class="result-header">
                <div class="result-profession" id="res-profession">PROFESSION</div>
                <div class="result-name" id="res-name">Name</div>
                <div class="result-slogan" id="res-slogan">"Slogan"</div>
            </div>
            
            <div class="result-desc" id="res-desc"></div>
            <div class="believe-card">
                <span>Core Believe</span>
                <strong id="res-believe"></strong>
            </div>

            <!-- 雷达图容器 -->
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>

            <div class="action-buttons">
                <button class="btn" onclick="location.reload()">重新测试</button>
                <button class="btn btn-secondary" onclick="showGallery()">查看全图鉴</button>
            </div>
        </div>

        <!-- 4. 全图鉴页（已修复不跳转的问题） -->
        <div id="gallery-section" class="section glass-panel">
            <h2 style="text-align: center; margin-bottom: 10px; font-weight: 300; letter-spacing: 2px;">QUESTVERSE 图鉴</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">We don’t grow by levels. We grow by beliefs.</p>
            <div class="gallery-grid" id="gallery-container"></div>
            <div style="text-align: center; margin-top: 40px;">
                <button class="btn btn-secondary" onclick="closeGallery()">← 返回我的结果</button>
            </div>
        </div>

    </div>

    <script>
        // --- 核心角色数据库 ---
        const questies = {
            "001": { name: "Sunlion 太阳狮", profession: "Builder", slogan: "Build Possibilities.", desc: "你拥有极强的感染力与资源整合能力。别人看见的是热情，真正特别的是：你永远相信未来可以被创造。", believe: "Every possibility begins with someone willing to build it." },
            "002": { name: "Moonowl 月鸮", profession: "Researcher", slogan: "Go Deep. Find Truth.", desc: "极其聪慧的学者。别人寻找表面的答案，你寻找底层的本质。你永远相信：世界还有更深的一层。", believe: "Truth always lives one layer deeper." },
            "003": { name: "Everphant 永恒象", profession: "Backbone", slogan: "Root Deep. Lift Others.", desc: "团队真正的脊梁。充满责任感，坚持长期主义。你明白真正的影响力不是自己跑得最快，而是托举起更多人。", believe: "Great things grow from steady hearts." },
            "004": { name: "Bloom Otter 花漾水獭", profession: "Spark", slogan: "Smile First. Magic Follows.", desc: "天生的幸运制造机，团队氛围担当。你总能敏锐捕捉小确幸，笑容就是你改变周遭磁场的最大超能力。", believe: "Small joys change everything." },
            "005": { name: "Nightlynx 夜猞猁", profession: "Guardian", slogan: "Stay Quiet. Stay Powerful.", desc: "最安静、最敏锐的观察者。别人看到的是沉默，真正厉害的是你一直都在思考，在暗中稳定全局。", believe: "Still waters run the deepest." },
            "006": { name: "Starlight Deer 星辉灵鹿", profession: "Warden", slogan: "Stand Steady. So Others Can Shine.", desc: "森林里的守望者。你并不渴望聚光灯，却一直默默守护着团队的边界。真正的力量不是征服，而是守护。", believe: "True Strength Protects." },
            "007": { name: "Wildcoon 野浣熊", profession: "Explorer", slogan: "Break Rules. Find New Ways.", desc: "最自由的探索者。别人沿着地图走，你创造新的地图。享受打破常规，永远对未知保持旺盛的好奇心。", believe: "Every new path begins with one brave step off the map." },
            "008": { name: "Stormraven 风暴渡鸦", profession: "Challenger", slogan: "知命而不认命，顺势而不失己。", desc: "拥有极高认知的挑战者。你不满足于现有的结论，不断挑战认知边界。相信世界永远值得被重新理解。", believe: "The future belongs to those who never stop questioning." },
            "009": { name: "Snowleap 雪跃豹", profession: "Connector", slogan: "世界没有标准答案，而我就是一种答案。", desc: "拥有极强共情力。擅长倾听与理解，总能真诚地建立起人与人的桥梁。别人因为你，开始相信连接的力量。", believe: "Understanding is the beginning of every connection." },
            "010": { name: "Dawnmust 晨曦野马", profession: "Vanguard", slogan: "Small Steps. Big Impact.", desc: "最热情的先锋行动派。别人还在纸上谈兵时，你已经率先迈出第一步。坚信行动永远比等待更有力量。", believe: "The fastest way forward is to start." },
            "011": { name: "Scarletfox 绯焰狐", profession: "Storyteller", slogan: "Strong Enough To Be Soft.", desc: "幽默、充满反差感。热爱生活细节，总能敏锐捕捉动人瞬间，并把平淡的日常讲述成极具吸引力的好故事。", believe: "Every story begins with courage." },
            "012": { name: "Stonehorn 岩角羊", profession: "Pioneer", slogan: "Walk Soft. Climb High.", desc: "温柔、坚定、勇敢，拥有极强主体性。别人看到你柔软的一面，真正厉害的是，目标一旦确定，就会不动声色地向前。", believe: "Gentleness and courage can live together." }
        };

        // --- 完整 12 题库 ---
        const questions = [
            { q: "周末突然空出了一整个下午，外面正下着细雨，你最本能的倾向是？", a: [{ text: "终于有时间把脑子里那个拖了很久的小计划动手实现了。", points: ["001", "010", "007"] }, { text: "泡一杯茶，找一部纪录片，或深度整理一下凌乱的思绪。", points: ["002", "005", "008"] }, { text: "给几个好朋友发消息约咖啡，或者去感受一下烟火气。", points: ["009", "004", "011"] }, { text: "按原计划收拾房间、列好下周To-Do，享受一切井井有条的安心感。", points: ["003", "012", "006"] }] },
            { q: "大家一起聚餐，面对一本厚厚的、没人看过的菜单，你通常的状态是？", a: [{ text: "迅速扫视一遍，把大家必吃的和招牌菜先定下来，把控大局。", points: ["001", "003", "006"] }, { text: "敏锐发现角落里某个奇特或创新的菜品，提议点来试试。", points: ["007", "010", "008"] }, { text: "仔细询问朋友忌口，尽量点大家都喜欢吃的，照顾体验。", points: ["009", "004", "012"] }, { text: "默默研究菜单逻辑或观察其他桌，给出精准的推荐建议。", points: ["002", "005", "011"] }] },
            { q: "在一个陌生的城市旅行，你发现手机导航突然失效了，你的第一反应是？", a: [{ text: "随便选个方向继续走，相信迷路也是探险，风景也许更好。", points: ["007", "004", "011"] }, { text: "找路边看起来和善的当地人直接问路，顺便聊两句。", points: ["009", "001", "010"] }, { text: "停下来，通过路牌规律或回忆刚才的地标，试图还原路线。", points: ["002", "005", "008"] }, { text: "找个咖啡馆先坐下，稳住同伴情绪，等信号恢复。", points: ["003", "006", "012"] }] },
            { q: "如果要给一个极其重要的朋友挑选生日礼物，你的标准通常是？", a: [{ text: "实用且经久耐用，能长久陪伴他，哪怕不够花哨。", points: ["003", "006", "005"] }, { text: "绝对独特、新奇，最好打破常规，让他眼前一亮。", points: ["007", "008", "002"] }, { text: "饱含特殊寓意或共同回忆，哪怕只是一封长信加小物件。", points: ["011", "009", "012"] }, { text: "他最近立刻用得上的，拆开瞬间能带来极高情绪价值的。", points: ["001", "004", "010"] }] },
            { q: "看一部精彩的电影或小说时，最让你起鸡皮疙瘩的瞬间是？", a: [{ text: "理清了所有复杂暗线，底层逻辑拼图严丝合缝地合拢。", points: ["002", "008", "005"] }, { text: "主角在绝境中不放弃，坚定守护所爱之人或初心的那一刻。", points: ["006", "003", "012"] }, { text: "巧妙的台词、充满张力的关系，以及故事背后对人性的隐喻。", points: ["011", "009", "004"] }, { text: "剧情彻底反转，主角打破规则，开创了完全意想不到的新局面。", points: ["007", "001", "010"] }] },
            { q: "当发现自己被误解，或团队里出现明显的意见分歧时，你会？", a: [{ text: "不急着辩解，把大家拉到一起，创造一个可以真诚对话的场域。", points: ["009", "012", "004"] }, { text: "默默梳理出整件事的时间线和核心矛盾点，用逻辑和事实说话。", points: ["002", "008", "005"] }, { text: "先稳住局势和大家的情绪，只要底线没破，分歧也可以是好事。", points: ["003", "006", "011"] }, { text: "用一个新的目标或破局点来转移注意力，在行动中解决分歧。", points: ["001", "010", "007"] }] },
            { q: "如果必须选择一种“超能力”在日常生活中使用，你最想要的是？", a: [{ text: "随时随地让周围人感到温暖和快乐的“治愈光环”。", points: ["004", "009", "011"] }, { text: "一眼看透事物运转规律和底线本质的“真理之眼”。", points: ["002", "008", "005"] }, { text: "把脑海中任何想象瞬间在现实中构建出来的“造物之手”。", points: ["001", "007", "012"] }, { text: "为自己和身边人抗下所有风险、绝对防御的“庇护结界”。", points: ["003", "006", "010"] }] },
            { q: "当一天结束，你独自一人走在回家的路上，脑海里最常浮现的念头是？", a: [{ text: "“今天又学到了/发现了什么新的东西？”", points: ["002", "007", "008"] }, { text: "“明天要把那个计划推进一步，我已经等不及了。”", points: ["001", "010", "012"] }, { text: "“希望我爱的人和团队，今天也都一切顺利。”", points: ["003", "006", "005"] }, { text: "“今天发生的某件小事真有意思，可以记下来。”", points: ["011", "004", "009"] }] },
            { q: "当你听到一个非常不可思议的传闻或行业大新闻时，你通常会？", a: [{ text: "立刻去搜索各个视角的资料，试图拼凑出事情的完整真相。", points: ["002", "008", "005"] }, { text: "敏锐察觉到里面的机会，脑子里开始盘算这能变成什么新项目。", points: ["001", "010", "007"] }, { text: "第一时间分享给最在乎的朋友，大家一起探讨或吃瓜。", points: ["004", "009", "011"] }, { text: "保持观望，不轻易下结论，确保这股风波不影响当下的节奏。", points: ["003", "006", "012"] }] },
            { q: "经历了一周极度消耗的工作后，周五晚上你最需要的‘充电’方式是？", a: [{ text: "找个安静的地方独处，沉浸在自己的小世界里，什么都不想。", points: ["005", "006", "003"] }, { text: "迫不及待地投身于真正的热爱中，比如搞点副业或研究新爱好。", points: ["007", "001", "012"] }, { text: "参加一场轻松的聚会，在和喜欢的人聊天大笑中恢复能量。", points: ["004", "009", "011"] }, { text: "去做一些能带来极强‘掌控感’的事，比如深度复盘或运动出汗。", points: ["010", "002", "008"] }] },
            { q: "如果你能拥有一台时光机回到童年，你最想对自己说的一句话是？", a: [{ text: "“别害怕犯错，尽情去折腾吧，未来比你想象的更精彩！”", points: ["007", "010", "001"] }, { text: "“保持你那份温柔和敏锐，总有一天它们会成为你最强大的武器。”", points: ["009", "011", "012"] }, { text: "“多读书，多去问‘为什么’，这个世界的答案都在等待你去发现。”", points: ["002", "008", "005"] }, { text: "“慢慢来，你会成为一个能让很多人依靠的了不起的大人。”", points: ["003", "006", "004"] }] },
            { q: "当一段漫长且艰难的旅程终于到达终点，看着眼前的风景，你内心的OS是？", a: [{ text: "“这只是一段路，下一座更高的山峰还在等我。”", points: ["008", "001", "012"] }, { text: "“太不容易了，还好这一路大家都在，谁也没有掉队。”", points: ["003", "006", "009"] }, { text: "“太有趣了！我要赶紧把这一路的奇遇讲给别人听！”", points: ["004", "011", "007"] }, { text: "“一切都结束了，但我已经在这个过程中，得到了想要的答案。”", points: ["002", "005", "010"] }] }
        ];

        let currentQuestion = 0;
        let scores = {};
        let selectionHistory = []; 

        function initScores() { for (let key in questies) scores[key] = 0; }
        initScores();

        function startQuiz() {
            document.getElementById('home-section').classList.remove('active');
            document.getElementById('quiz-section').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const qData = questions[currentQuestion];
            document.getElementById('question').innerText = `Q${currentQuestion + 1}/${questions.length}. ${qData.q}`;
            
            setTimeout(() => { document.getElementById('progress').style.width = `${((currentQuestion) / questions.length) * 100}%`; }, 50);

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = ''; 

            qData.a.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option.text;
                btn.onclick = () => selectOption(option.points);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('back-btn').style.display = currentQuestion > 0 ? 'inline-block' : 'none';
        }

        function selectOption(points) {
            selectionHistory.push(points); 
            points.forEach(p => scores[p] += 1);
            currentQuestion++;

            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                document.getElementById('progress').style.width = `100%`;
                setTimeout(showResult, 400);
            }
        }

        function goBack() {
            if (currentQuestion > 0) {
                const lastPoints = selectionHistory.pop(); 
                lastPoints.forEach(p => scores[p] -= 1); 
                currentQuestion--;
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-section').classList.remove('active');
            
            let maxScore = -1;
            let finalId = "001";
            for (let id in scores) { if (scores[id] > maxScore) { maxScore = scores[id]; finalId = id; } }

            const res = questies[finalId];
            document.getElementById('res-profession').innerText = res.profession;
            document.getElementById('res-name').innerText = res.name;
            document.getElementById('res-slogan').innerText = `"${res.slogan}"`;
            document.getElementById('res-desc').innerText = res.desc;
            document.getElementById('res-believe').innerHTML = res.believe;

            document.getElementById('result-section').classList.add('active');
            renderRadarChart();
            renderGallery();
        }

        let myChart = null;
        function renderRadarChart() {
            const dimensionScores = [
                scores["001"] + scores["007"], 
                scores["002"] + scores["008"], 
                scores["003"] + scores["006"] + scores["005"], 
                scores["009"] + scores["011"], 
                scores["010"] + scores["012"], 
                scores["004"] + scores["009"]  
            ];

            const ctx = document.getElementById('radarChart').getContext('2d');
            if (myChart) myChart.destroy(); 

            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['创造突破', '智慧求真', '守护托底', '共情链接', '先锋行动', '情绪火花'],
                    datasets: [{
                        label: '你的信念象限',
                        data: dimensionScores,
                        backgroundColor: 'rgba(100, 255, 218, 0.2)',
                        borderColor: '#64ffda',
                        pointBackgroundColor: '#64ffda',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#64ffda',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { color: '#9ca3af', font: { size: 12, family: '-apple-system' } },
                            ticks: { display: false, min: 0 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderGallery() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';
            for (let id in questies) {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `<h4>${questies[id].name}</h4><p>${questies[id].profession}</p>`;
                container.appendChild(item);
            }
        }

        function showGallery() {
            document.getElementById('result-section').classList.remove('active');
            document.getElementById('gallery-section').classList.add('active');
        }

        function closeGallery() {
            document.getElementById('gallery-section').classList.remove('active');
            document.getElementById('result-section').classList.add('active');
        }
    </script>
</body>
</html>
